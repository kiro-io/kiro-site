<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Request Received — Kiro</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D1117; color: #F8FAFC; font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .card {
      background: #0F1A2E; border: 1px solid #1E293B; border-radius: 20px;
      padding: 56px 48px; max-width: 520px; width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
    .grad { background: linear-gradient(135deg, #10B981, #6366F1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { color: #94A3B8; line-height: 1.7; margin-bottom: 32px; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #10B981, #6366F1);
      color: white; font-weight: 700; font-size: 15px;
      padding: 13px 28px; border-radius: 10px; text-decoration: none;
      transition: opacity .2s;
    }
    a:hover { opacity: .88; }
    .nav-k {
      width: 40px; height: 40px; border-radius: 10px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #6366F1, #10B981);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="nav-k">K</div>
    <div class="icon">✅</div>
    <h1>You're on the list.<br><span class="grad">We'll be in touch.</span></h1>
    <p>Your demo request was received. Someone from the Kiro team will reach out within 1 business day to schedule a 30-minute walkthrough tailored to your setup.</p>
    <a href="index.html">← Back to Kiro</a>
  </div>
</body>
</html>
